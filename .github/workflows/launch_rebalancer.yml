name: Launch Rebalancer
on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Load environment variables
      run: |
        echo "CHAIN_ID=8453" >> .env
        echo "RPC_URL=${{ secrets.RPC_URL }}" >> .env
        echo "CONTRACT_ADDRESS=${{ secrets.CONTRACT_ADDRESS }}" >> .env
        echo "PRIVATE_KEY=${{ secrets.PRIVATE_KEY }}" >> .env
        echo "MIN_APY_IMPROVEMENT=${{ vars.MIN_APY_IMPROVEMENT || '0.5' }}" >> .env

    - name: Run rebalancer
      run: node scripts/rebalancer.js
